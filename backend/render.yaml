services:
  - type: web
    name: hrms-lite-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
        # OR set manually to your PostgreSQL connection string:
        # value: postgresql://user:password@host:port/dbname
